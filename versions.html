<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버전 관리 — DQA Ticket Manager</title>
  <link rel="icon" type="image/png" href="favicon_32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<!-- ─── 상단 바 ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <button id="btn-back" class="btn btn-back">← 목록</button>
  <h1 class="app-title">버전 관리</h1>
  <div class="lang-dropdown" style="margin-left:auto">
    <button type="button" class="lang-dropdown-btn" id="lang-dropdown-btn"></button>
    <div class="lang-dropdown-menu" id="lang-dropdown-menu">
      <button type="button" class="lang-option" data-lang="ko"><span class="fi fi-kr"></span> 한국어</button>
      <button type="button" class="lang-option" data-lang="jp"><span class="fi fi-jp"></span> 日本語</button>
      <button type="button" class="lang-option" data-lang="en"><span class="fi fi-gb"></span> English</button>
      <button type="button" class="lang-option" data-lang="vi"><span class="fi fi-vn"></span> Tiếng Việt</button>
    </div>
  </div>
</header>

<!-- ─── 로딩 오버레이 (전체 화면 덮기) ──────────────────────────────────── -->
<div id="loading" class="detail-loading-overlay" style="display:flex">
  <div class="spinner"></div>
  <span class="detail-loading-text" data-i18n="loading">로딩 중...</span>
</div>

<!-- ─── 메인 ────────────────────────────────────────────────────────────── -->
<main class="ver-main">

  <!-- 버전 목록 테이블 -->
  <section class="ver-section">
    <div class="ver-section-header ver-list-header">
      <span class="ver-section-title"><span>버전</span><span>목록</span></span>
      <span id="ver-changed-badge" class="ver-changed-badge" style="visibility:hidden"><span>순서</span><span>변경됨</span></span>
      <button id="btn-reset-order" class="btn btn-secondary btn-sm" disabled><span>↺ 원래</span><span>대로</span></button>
      <button id="btn-save-order" class="btn btn-sm ver-btn-save-order" disabled><span>💾 순서</span><span>저장</span></button>
    </div>
    <div class="table-scroll">
      <table class="ver-table" id="ver-table">
        <thead>
          <tr>
            <th class="ver-th-sortable ver-th-name" data-col="name">버전명<span class="ver-sort-icon"></span></th>
            <th class="ver-th-sortable ver-col-center ver-th-count" data-col="count">티켓수<span class="ver-sort-icon"></span></th>
            <th class="ver-th-sortable ver-col-center ver-th-date" data-col="date">생성일<span class="ver-sort-icon"></span></th>
            <th class="ver-col-center ver-th-action">작업</th>
            <th class="ver-th-handle"></th>
          </tr>
        </thead>
        <tbody id="ver-tbody"></tbody>
      </table>
    </div>
    <p class="ver-hint" id="ver-hint">핸들을 드래그해서 순서 변경 · 헤더 클릭으로 임시 정렬 (정렬 중 드래그 비활성)</p>
  </section>

  <!-- 새 버전 추가 폼 -->
  <section class="ver-section ver-add-section">
    <div class="ver-section-header">새 버전 추가</div>
    <div class="ver-add-form">
      <input type="text" id="new-version-name" class="ver-name-input" placeholder="예) V09.02.20" maxlength="50">
      <button type="button" id="btn-add-ver" class="btn btn-primary">추가</button>
    </div>
  </section>

</main>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/versions.js"></script>
</body>
</html>
