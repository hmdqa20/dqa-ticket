<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DQA Ticket Manager</title>
  <link rel="icon" type="image/png" href="favicon_32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<!-- ─── 상단 바 ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <button id="btn-back" class="btn btn-back btn-back-detail">
    <span class="btn-back-arrow">←</span><span class="btn-back-label" data-i18n="btn_back_label">목록</span>
  </button>
  <h1 id="page-title" class="app-title" data-i18n="page_title_edit">티켓 상세</h1>
  <span id="lock-status" class="lock-status" style="display:none;"></span>
  <div class="lang-dropdown" style="margin-left:auto">
    <button type="button" class="lang-dropdown-btn" id="lang-dropdown-btn"></button>
    <div class="lang-dropdown-menu" id="lang-dropdown-menu">
      <button type="button" class="lang-option" data-lang="ko"><span class="fi fi-kr"></span> 한국어</button>
      <button type="button" class="lang-option" data-lang="jp"><span class="fi fi-jp"></span> 日本語</button>
      <button type="button" class="lang-option" data-lang="en"><span class="fi fi-gb"></span> English</button>
      <button type="button" class="lang-option" data-lang="vi"><span class="fi fi-vn"></span> Tiếng Việt</button>
    </div>
  </div>
  <button id="btn-delete" class="btn btn-danger" style="display:none" data-i18n="btn_delete">삭제</button>
  <button id="btn-cancel-top" class="btn btn-secondary" style="display:none" data-i18n="btn_cancel">취소</button>
  <button id="btn-new-ticket" class="btn btn-secondary" style="display:none" data-i18n="btn_new_ticket">티켓등록</button>
  <button id="btn-edit" class="btn btn-primary" style="display:none" data-i18n="btn_edit">수정</button>
  <button id="btn-save-top" class="btn btn-primary" style="display:none" data-i18n="btn_save">저장</button>
</header>

<!-- ─── 실시순서 충돌 확인 모달 ────────────────────────────────────────── -->
<div id="cascade-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <p id="cascade-msg" class="modal-msg"></p>
    <label class="modal-skip-label">
      <input type="checkbox" id="cascade-skip-today">
      <span data-i18n="skip_today">오늘 그만 보기</span>
    </label>
    <div class="modal-actions">
      <button id="cascade-cancel" class="btn btn-secondary" data-i18n="btn_cancel">취소</button>
      <button id="cascade-ok" class="btn btn-primary" data-i18n="btn_confirm">확인</button>
    </div>
  </div>
</div>

<!-- ─── 로딩 오버레이 ───────────────────────────────────────────────────── -->
<div id="detail-loading" class="detail-loading-overlay" style="display:flex">
  <div class="spinner"></div>
  <span class="detail-loading-text" data-i18n="loading">로딩 중...</span>
</div>

<!-- ─── 폼 ──────────────────────────────────────────────────────────────── -->
<main class="detail-main">
  <div class="detail-card">
    <form id="ticket-form" class="ticket-form" onsubmit="return false">

      <!-- 상단 메타 4단: 티켓번호 | 바로가기 | 등록날짜 | WJIRA 결과기재 -->
      <div class="meta-grid">
        <div class="form-group">
          <label data-i18n="label_ticket_id">티켓번호</label>
          <div class="ticket-id-row">
            <div class="ticket-id-wrap" id="ticket-id-edit-wrap">
              <select id="ticket-prefix" class="ticket-prefix-select">
                <option value="XAX2-">XAX2-</option>
                <option value="XAX-">XAX-</option>
              </select>
              <input type="text" id="ticket-id-num" inputmode="numeric" pattern="[0-9]+" placeholder="1234">
            </div>
            <span id="ticket-id-static" class="static-value" style="display:none"></span>
            <button type="button" id="btn-fetch" class="btn btn-secondary" data-i18n="btn_fetch" style="display:none">가져오기</button>
          </div>
        </div>
        <div class="form-group">
          <!-- 헤더 텍스트 삭제, 4단 그리드 유지 위해 빈 label로 높이만 확보 -->
          <label>&nbsp;</label>
          <a id="btn-wjira-link" href="#" target="_blank" class="btn btn-secondary btn-link-compact" data-i18n="btn_wjira_link" style="display:none">티켓 바로 가기</a>
        </div>
        <div class="form-group">
          <label data-i18n="label_created_date">등록날짜</label>
          <span id="created-date" class="static-value">-</span>
        </div>
        <div class="form-group">
          <label data-i18n="label_wjira">WJIRA 결과기재</label>
          <label class="checkbox-label">
            <input type="checkbox" id="wjira-updated">
            <span>OK</span>
          </label>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="form-divider"></div>

      <!-- 이슈명 -->
      <div class="form-group">
        <label data-i18n="label_title">이슈명</label>
        <div class="input-clearable">
          <textarea id="title-input" rows="8" data-i18n-placeholder="label_title" placeholder="이슈명"></textarea>
          <button type="button" id="btn-clear-title" class="btn-clear-input" style="display:none">×</button>
        </div>
        <div id="title-translation-hint" class="title-translation-hint" style="display:none"></div>
      </div>

      <!-- 구분선 -->
      <div class="form-divider"></div>

      <!-- 3단 그리드: 확인버전 | 진행 정보 | 버전 이동 -->
      <div class="detail-3col">

        <!-- 1단: 확인버전 -->
        <div class="form-section">
          <div class="form-section-title" data-i18n="label_check_version">확인버전</div>
          <div class="form-group">
            <label data-i18n-version-label="placeholder_version" data-version-num="1">버전 1</label>
            <input type="text" class="version-input" data-version-num="1" data-i18n-placeholder="placeholder_version" placeholder="버전 1">
          </div>
          <div class="form-group">
            <label data-i18n-version-label="placeholder_version" data-version-num="2">버전 2</label>
            <input type="text" class="version-input" data-version-num="2" data-i18n-placeholder="placeholder_version" placeholder="버전 2">
          </div>
          <div class="form-group">
            <label data-i18n-version-label="placeholder_version" data-version-num="3">버전 3</label>
            <input type="text" class="version-input" data-version-num="3" data-i18n-placeholder="placeholder_version" placeholder="버전 3">
          </div>
          <div class="form-group">
            <label data-i18n-version-label="placeholder_version" data-version-num="4">버전 4</label>
            <input type="text" class="version-input" data-version-num="4" data-i18n-placeholder="placeholder_version" placeholder="버전 4">
          </div>
        </div>

        <!-- 2단: 진행 정보 -->
        <div class="form-section">
          <div class="form-section-title" data-i18n="label_progress_info">진행 정보</div>
          <div class="form-group">
            <label data-i18n="label_assignee">담당자</label>
            <select id="assignee">
              <option value="">—</option>
              <option value="정기석">정기석</option>
              <option value="박수완">박수완</option>
              <option value="한국">한국</option>
              <option value="MVN">MVN</option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="label_priority">실시순서</label>
            <!-- 목록에서 드래그로 변경, 상세/등록은 읽기전용 -->
            <input type="text" id="priority" readonly>
          </div>
          <div class="form-group">
            <label data-i18n="label_status">진행상태</label>
            <select id="status">
              <option value="진행전" data-i18n="status_pending">진행전</option>
              <option value="진행중" data-i18n="status_active">진행중</option>
              <option value="재테스트" data-i18n="status_retest">재테스트</option>
              <option value="완료" data-i18n="status_done_opt">완료</option>
              <option value="보류" data-i18n="status_hold_opt">보류</option>
              <option value="N/A" data-i18n="status_na">N/A</option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="label_verdict">결과</label>
            <select id="verdict">
              <option value="">—</option>
              <option value="OK">OK</option>
              <option value="NG">NG</option>
            </select>
          </div>
        </div>

        <!-- 3단: 버전 이동 -->
        <div class="form-section form-section-top">
          <div class="form-section-title" data-i18n="label_version_move">버전 이동</div>
          <div class="form-group" id="version-move-group">
            <div class="version-move-header">
              <label data-i18n="label_version_select">버전 선택</label>
              <span class="version-badge" id="version-move-badge"></span>
            </div>
            <select id="version-move-select"></select>
          </div>
        </div>

      </div>

      <!-- 구분선 -->
      <div class="form-divider"></div>

      <!-- 파일 첨부 -->
      <div class="form-group">
        <label data-i18n="label_files">파일 첨부</label>
        <p class="hint-text" data-i18n="hint_file_size_limit">구글 드라이브 공유 용량(15GB) 한도를 고려해, 1GB 이상의 대용량 파일(펌웨어 등)은 직접 올리지 말고 아래 링크 항목을 이용해 주세요.</p>
        <div id="drop-zone" class="drop-zone" data-i18n="drag_drop">파일을 드래그하거나 클릭하여 업로드</div>
        <input type="file" id="file-input" style="display:none" multiple>
        <div id="file-list" class="file-list"></div>
      </div>

      <!-- 구분선 -->
      <div class="form-divider"></div>

      <!-- 링크 -->
      <div class="form-group">
        <label data-i18n="label_links">링크</label>
        <div id="links-display" class="links-display"></div>
        <div class="links-grid">
          <div class="link-group">
            <div class="link-group-header">Link 1</div>
            <input type="text" class="link-label-input" data-link-num="1" data-i18n-placeholder="placeholder_link_label" placeholder="파일 설명">
            <input type="url" class="link-url-input" data-link-num="1" placeholder="https://...">
          </div>
          <div class="link-group">
            <div class="link-group-header">Link 2</div>
            <input type="text" class="link-label-input" data-link-num="2" data-i18n-placeholder="placeholder_link_label" placeholder="파일 설명">
            <input type="url" class="link-url-input" data-link-num="2" placeholder="https://...">
          </div>
          <div class="link-group">
            <div class="link-group-header">Link 3</div>
            <input type="text" class="link-label-input" data-link-num="3" data-i18n-placeholder="placeholder_link_label" placeholder="파일 설명">
            <input type="url" class="link-url-input" data-link-num="3" placeholder="https://...">
          </div>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="form-divider"></div>

      <!-- 확인결과 -->
      <div class="form-group">
        <label data-i18n="label_check_content">확인결과</label>
        <div id="check-content-view" class="text-view" style="display:none"></div>
        <textarea id="check-content" rows="25" data-i18n-placeholder="placeholder_check_content" placeholder="확인결과를 입력하세요"></textarea>
      </div>

      <!-- 비고 -->
      <div class="form-group">
        <label data-i18n="label_note">비고</label>
        <div id="note-view" class="text-view" style="display:none"></div>
        <textarea id="note" rows="8" data-i18n-placeholder="placeholder_note" placeholder="비고를 입력하세요"></textarea>
      </div>

    </form>
  </div>
</main>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/detail.js"></script>
</body>
</html>
